<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPP - Master List</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <a class="s-back-btn" href="index.html" aria-label="Back to Admin">
    <span class="s-back-btn-icon" aria-hidden="true"></span>
  </a>

  <main class="fpp-main">
    <div class="fpp-shell">
      <section class="fpp-left">
        <div class="fpp-titlebar">FIXED POINT PHOTOGRAPH MASTER LIST</div>
        <div class="fpp-table-wrapper">
          <table class="fpp-table">
            <thead>
              <tr class="fpp-header-row-main">
                <th colspan="2" style="text-align:left">FPP Master list</th>
                <th colspan="3" style="text-align:right">Unit : <span id="fppUnit">18</span></th>
              </tr>
              <tr class="fpp-header-row-sub">
                <th rowspan="2">Sl. No.</th>
                <th rowspan="2">5S Zone No.</th>
                <th rowspan="2">5S Zone Desc.</th>
                <th colspan="2">FPP</th>
              </tr>
              <tr class="fpp-header-row-sub">
                <th>FPP No.</th>
                <th>FPP Desc.</th>
              </tr>
            </thead>
            <tbody id="fppTableBody"></tbody>
          </table>
        </div>
      </section>

      <aside class="fpp-right" aria-label="Month wise layout and helper">
        <div class="fpp-month-layout-panel">
          <button class="fpp-monthwise-btn" id="monthWiseLayoutBtn" type="button" aria-label="Open Month Wise Layout">
            <span class="fpp-monthwise-btn-icon" aria-hidden="true"></span>
            <span class="fpp-monthwise-btn-text">MONTH WISE LAYOUT</span>
          </button>
        </div>
        <div class="fpp-helper-panel">
          <img src="office boy.gif" alt="FPP helper animation" class="fpp-helper-img" />
        </div>
      </aside>
    </div>
  </main>

  <script src="offline-store.js"></script>
  <script src="fpp.js"></script>
</body>
</html>
