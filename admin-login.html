<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body class="admin-page-body">
  <main class="admin-login">
    <div class="admin-card">
      <h1>Admin Login</h1>
      <p class="admin-subtitle">Sign in to update website content and images.</p>

      <form id="loginForm" class="admin-form" autocomplete="on">
        <label class="admin-field">
          Username
          <input name="username" type="text" required />
        </label>
        <label class="admin-field">
          Password
          <input name="password" type="password" required />
        </label>
        <button class="admin-primary-btn" type="submit">Login</button>
        <div id="loginError" class="admin-error" aria-live="polite"></div>
      </form>

      <a class="admin-link" href="index.html">← Back to website</a>
    </div>
  </main>

  <script src="admin-login.js"></script>
</body>
</html>
