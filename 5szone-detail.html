<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone Detail | 5S Zones</title>
  <link rel="stylesheet" href="styles.css?v=20260311-1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="zone-detail-page">
  <a href="5szones.html" class="s-back-btn" aria-label="Back to 5S Zones">
    <span class="s-back-btn-icon"></span>
  </a>

  <main class="zone-detail-main">
    <div class="zone-detail-slide zone-detail-slide--scores is-active" data-slide="0">
      <div class="zone-detail-slide-inner">
        <div class="zone-header-row">
          <aside class="zone-person-card" aria-label="Zone Champion">
            <div class="zone-person-title">Zone Champion</div>
            <div class="zone-person-photo">
              <img id="zoneChampionImg" alt="Zone Champion photo" src="" />
            </div>
            <div class="zone-person-name is-empty" id="zoneChampionName">Name</div>
          </aside>

          <div class="zone-title-wrap">
            <h1 class="zone-detail-title" id="zoneTitle">ZONE - 1</h1>
            <div class="zone-chart-wrap">
              <canvas id="zoneScoreChart" width="800" height="280"></canvas>
            </div>
          </div>

          <aside class="zone-person-card" aria-label="Zone Leader">
            <div class="zone-person-title">Zone Leader</div>
            <div class="zone-person-photo">
              <img id="zoneLeaderImg" alt="Zone Leader photo" src="" />
            </div>
            <div class="zone-person-name is-empty" id="zoneLeaderName">Name</div>
          </aside>
        </div>
        <div class="zone-score-table-wrap">
          <div class="zone-week-range">
            <span>Weeks:</span>
            <button type="button" class="zone-range-btn" data-start="1">1-5</button>
            <button type="button" class="zone-range-btn" data-start="6">6-10</button>
            <button type="button" class="zone-range-btn" data-start="11">11-15</button>
            <button type="button" class="zone-range-btn" data-start="16">16-20</button>
            <button type="button" class="zone-range-btn" data-start="21">21-25</button>
            <button type="button" class="zone-range-btn" data-start="26">26-30</button>
            <button type="button" class="zone-range-btn" data-start="31">31-35</button>
            <button type="button" class="zone-range-btn" data-start="36">36-40</button>
            <button type="button" class="zone-range-btn" data-start="41">41-45</button>
            <button type="button" class="zone-range-btn" data-start="48">48-52</button>
          </div>
          <div class="zone-audit-table-wrap zone-audit-table-wrap--no-scroll">
            <table class="zone-audit-table zone-audit-table--readonly" id="zoneAuditTable">
              <colgroup>
                <col class="zone-col-location">
                <col class="zone-col-checkpoints">
                <col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day">
                <col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day">
                <col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day">
                <col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day">
                <col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day"><col class="zone-col-day">
              </colgroup>
              <thead>
                <tr>
                  <th class="zone-audit-location" rowspan="3">Location</th>
                  <th class="zone-audit-checkpoints" rowspan="3">Check Points</th>
                  <th colspan="5" class="zone-audit-week" data-w="1">Week No: <span id="zoneW1No"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="2">Week No: <span id="zoneW2No"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="3">Week No: <span id="zoneW3No"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="4">Week No: <span id="zoneW4No"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="5">Week No: <span id="zoneW5No"></span></th>
                </tr>
                <tr class="zone-audit-date-row">
                  <th colspan="5" class="zone-audit-week" data-w="1">Dt: <span id="zoneW1Dt"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="2">Dt: <span id="zoneW2Dt"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="3">Dt: <span id="zoneW3Dt"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="4">Dt: <span id="zoneW4Dt"></span></th>
                  <th colspan="5" class="zone-audit-week" data-w="5">Dt: <span id="zoneW5Dt"></span></th>
                </tr>
                <tr class="zone-audit-day-row">
                  <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                  <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                  <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                  <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                  <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                </tr>
              </thead>
              <tbody id="zoneAuditBody">
                <!-- 5 checkpoint rows + Total row + Checked By row (read-only) -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="zone-detail-slide zone-detail-slide--observations" data-slide="1">
      <div class="zone-detail-slide-inner">
        <h2 class="zone-obs-title">Observations & Corrective Actions</h2>
        <div class="zone-obs-table-scroll">
          <table class="zone-obs-table" id="zoneObsTable">
            <thead>
              <tr>
                <th>Week no</th>
                <th>Location</th>
                <th>Observation</th>
                <th>Corrective Action</th>
                <th>Resp</th>
                <th>Target Date</th>
                <th>Completed Date</th>
              </tr>
            </thead>
            <tbody id="zoneObsBody">
              <!-- Dynamic rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="5szone-detail.js"></script>
</body>
</html>
